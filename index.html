<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Toxic Taffy Slimes</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a001f);
      color: #fff;
      text-align: center;
    }

    header {
      padding: 80px 20px 40px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
      color: #39ff14;
      text-shadow: 0 0 10px #39ff14;
    }

    p {
      font-size: 1.2rem;
      color: #ddd;
    }

    .btn {
      display: inline-block;
      margin-top: 25px;
      padding: 15px 30px;
      background: #ff00c8;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
      box-shadow: 0 0 15px #ff00c8;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ff4ddb;
      box-shadow: 0 0 25px #ff4ddb;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      padding: 40px 20px;
    }

    .item {
      text-align: center;
    }

    .item img {
      width: 100%;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,255,0,0.2);
    }

    .title {
      margin-top: 10px;
      font-weight: bold;
      color: #39ff14;
    }

    footer {
      padding: 30px 20px;
      font-size: 0.9rem;
      color: #aaa;
    }

    .socials a {
      color: #39ff14;
      margin: 0 10px;
      text-decoration: none;
    }

  </style>
</head>

<body>

<header>
  <h1>Toxic Taffy Slimes</h1>
  <p>Stretch it. Pop it. Get addicted. 🧪</p>
  <a class="btn" href="#">Shop Now</a>
</header>

<section class="gallery">
  <div class="item">
    <img src="slime1.jpg" alt="Toxic Sludge">
    <div class="title">Toxic Sludge</div>
  </div>

  <div class="item">
    <img src="slime2.jpg" alt="Toxic Glow">
    <div class="title">Toxic Glow</div>
  </div>

  <div class="item">
    <img src="slime3.jpg" alt="Toxic Cotton Candy">
    <div class="title">Toxic Cotton Candy</div>
  </div>
</section>

<footer>
  <p>Follow the slime madness</p>
  <div class="socials">
    <a href="#">TikTok</a> |
    <a href="#">YouTube</a>
  </div>
</footer>

</body>
</html>
